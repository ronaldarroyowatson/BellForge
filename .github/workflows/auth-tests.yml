name: Auth Integrity Tests

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "bugfix/**"
      - "hotfix/**"
      - main
  workflow_dispatch:

jobs:
  auth-tests:
    name: Auth Test Matrix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node (npm test entrypoint)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r updater/requirements.txt
          pip install -r tests/requirements-auth.txt

      - name: Run auth suite with coverage threshold
        run: npm run test:auth

      - name: Run auth suite in parallel mode
        run: npm run test:auth:parallel
