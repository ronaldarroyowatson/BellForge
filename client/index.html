<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BellForge Display</title>
  <style>
    :root {
      --display-scale: 1;
    }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0d1117;
      color: #f0f6fc;
      font-family: "Segoe UI", sans-serif;
    }
    #viewport {
      position: fixed;
      inset: 0;
      transform: scale(var(--display-scale));
      transform-origin: center center;
      overflow: hidden;
    }
    #screen {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .status-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f3efe7;
    }
    #status {
      position: fixed;
      bottom: 10px;
      right: 12px;
      font-size: 12px;
      color: #8b949e;
      background: rgba(0, 0, 0, 0.35);
      padding: 4px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="screen"></div>
    <div id="status">Connecting...</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const displayId = params.get("id") || "main";
    const serverUrl = window.BELLFORGE_SERVER_URL || window.location.origin;
    const EMPTY_STATE_DELAY_MS = 7000;
    const MIN_STATUS_SCREEN_MS = 3000;
    const statusEl = document.getElementById("status");
    const screenEl = document.getElementById("screen");
    const rootEl = document.documentElement;
    let activeMode = null;
    let emptyStateTimer = null;
    let emptyStateReady = false;
    let sawEmptyState = false;
    let statusStageShown = false;
    let statusShownAt = 0;

    async function refreshDisplayPreferences() {
      try {
        const res = await fetch(`${serverUrl}/api/display/preferences`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const scale = Number(data.display_scale || 1);
        rootEl.style.setProperty("--display-scale", String(scale));
      } catch (error) {
        rootEl.style.setProperty("--display-scale", "1");
      }
    }

    function clearEmptyStateTimer() {
      if (emptyStateTimer) {
        clearTimeout(emptyStateTimer);
        emptyStateTimer = null;
      }
    }

    function renderStatusFrame() {
      const statusUrl = `${serverUrl}/status?view=display&id=${encodeURIComponent(displayId)}`;
      const enteringStatus = activeMode !== "empty-state-status";
      screenEl.innerHTML = `<iframe class="status-frame" title="BellForge device status" src="${statusUrl}"></iframe>`;
      activeMode = "empty-state-status";
      if (enteringStatus) {
        statusStageShown = true;
        statusShownAt = Date.now();
      }
      statusEl.textContent = `Display ${displayId} | Ready to connect`;
    }

    async function checkEmptyStateReady() {
      try {
        const res = await fetch(`${serverUrl}/api/device/status`, { cache: "no-store" });
        if (!res.ok) return false;
        const data = await res.json();
        return data.repair_service_running !== true;
      } catch (error) {
        return false;
      }
    }

    async function checkContentReady() {
      const probes = [
        `${serverUrl}/health`,
        `${serverUrl}/client/index.html`,
        `${serverUrl}/client/js/main.js`,
      ];

      try {
        const results = await Promise.all(
          probes.map(async (url) => {
            const res = await fetch(url, { cache: "no-store" });
            return res.ok;
          })
        );
        return results.every(Boolean);
      } catch (error) {
        return false;
      }
    }

    function renderEmptyState(payloadHtml) {
      if (activeMode === "empty-state-status") {
        statusEl.textContent = `Display ${displayId} | Ready to connect`;
        return;
      }

      if (activeMode !== "empty-state-splash") {
        screenEl.innerHTML = payloadHtml || "<h1>BellForge</h1>";
        activeMode = "empty-state-splash";
      }

      statusEl.textContent = `Display ${displayId} | Showing setup details soon`;
      if (!emptyStateTimer) {
        emptyStateTimer = setTimeout(() => {
          emptyStateTimer = null;
          // Always move to the status frame after the splash delay so the device
          // never gets stuck on the welcome screen if readiness probes are flaky.
          renderStatusFrame();
        }, EMPTY_STATE_DELAY_MS);
      }
    }

    async function refreshPayload() {
      try {
        const res = await fetch(`${serverUrl}/display/${encodeURIComponent(displayId)}/payload`, {
          cache: "no-store",
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const payload = await res.json();
        const isEmptyState =
          payload.mode === "empty-state" ||
          String(payload.html || "").includes("bellforge-empty-state");

        if (isEmptyState) {
          sawEmptyState = true;
          emptyStateReady = await checkEmptyStateReady();
          if (activeMode === "empty-state-status") {
            statusEl.textContent = `Display ${displayId} | Ready to connect`;
            return;
          }

          if (emptyStateReady && !emptyStateTimer) {
            renderStatusFrame();
            return;
          }

          renderEmptyState(payload.html);
          return;
        }

        if (sawEmptyState && !statusStageShown) {
          clearEmptyStateTimer();
          renderStatusFrame();
          statusEl.textContent = `Display ${displayId} | Waiting for server and assets`;
          return;
        }

        if (sawEmptyState && statusStageShown && Date.now() - statusShownAt < MIN_STATUS_SCREEN_MS) {
          statusEl.textContent = `Display ${displayId} | Waiting for server and assets`;
          return;
        }

        const contentReady = await checkContentReady();
        if (!contentReady) {
          clearEmptyStateTimer();
          renderStatusFrame();
          statusEl.textContent = `Display ${displayId} | Waiting for server and assets`;
          return;
        }

        clearEmptyStateTimer();
        screenEl.innerHTML = payload.html || "<h1>BellForge</h1>";
        activeMode = "content";
        sawEmptyState = false;
        statusStageShown = false;
        statusShownAt = 0;
        statusEl.textContent = `Display ${displayId} | Updated ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        clearEmptyStateTimer();
        statusEl.textContent = `Display ${displayId} | Offline`;
      }
    }

    refreshDisplayPreferences();
    refreshPayload();
    setInterval(refreshDisplayPreferences, 10000);
    setInterval(refreshPayload, 15000);
  </script>
</body>
</html>
