<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BellForge Display</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0d1117;
      color: #f0f6fc;
      font-family: "Segoe UI", sans-serif;
    }
    #screen {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #status {
      position: fixed;
      bottom: 10px;
      right: 12px;
      font-size: 12px;
      color: #8b949e;
      background: rgba(0, 0, 0, 0.35);
      padding: 4px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="screen"></div>
  <div id="status">Connecting...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const displayId = params.get("id") || "main";
    const serverUrl = window.BELLFORGE_SERVER_URL || window.location.origin;
    const statusEl = document.getElementById("status");
    const screenEl = document.getElementById("screen");

    async function refreshPayload() {
      try {
        const res = await fetch(`${serverUrl}/display/${encodeURIComponent(displayId)}/payload`, {
          cache: "no-store",
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const payload = await res.json();
        screenEl.innerHTML = payload.html || "<h1>BellForge</h1>";
        statusEl.textContent = `Display ${displayId} | Updated ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        statusEl.textContent = `Display ${displayId} | Offline`;
      }
    }

    refreshPayload();
    setInterval(refreshPayload, 15000);
  </script>
</body>
</html>
